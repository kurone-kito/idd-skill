name: IDD advisory-convergence gate
# Optional, opt-in required-check workflow (see ONBOARDING.md "Optional
# — host idd-advisory-convergence as a required-check CI workflow" for
# the full rationale, the required-check Ruleset registration step, and
# the waiver-after-deadline escape path). Copy this file into your
# repository's .github/workflows/ to enable it -- it is not wired in
# automatically by importing the rest of idd-template/, since a new
# required-status-check-able workflow is a deliberate adopter decision,
# not a default.
#
# Adjust `runs-on`, the pinned `actions/checkout` SHA (or use the
# floating `@v4` tag as shipped here), the checkout `ref:` (see below),
# and the `node scripts/...` command to your own runner labels and
# helper-runtime profile. This file intentionally uses the portable
# `ubuntu-latest` + `@v4` forms rather than a repository-specific
# pinned SHA or custom runner label, unlike this source repository's
# own dogfooded copy at .github/workflows/idd-advisory-convergence.yml.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to re-check (e.g. after posting a maintainer waiver)
        required: true
        type: number
permissions:
  contents: read
  issues: read
  pull-requests: read
jobs:
  idd-advisory-convergence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Trusted default-branch checkout, not the PR head, for any
          # trigger type including workflow_dispatch: the enforcement
          # script (scripts/advisory-convergence.mjs) and its config
          # (.github/idd/config.json) must be the trusted copy, not the
          # PR's own -- otherwise a PR could edit the verdict logic
          # itself to force `ready: true`. The verdict still correctly
          # evaluates the intended PR: `--pr <number>` below drives
          # every live GitHub API call the script makes, independent of
          # what is checked out locally. Replace `main` with your own
          # default branch name if it differs.
          ref: main
          persist-credentials: false
      # ubuntu-latest's preinstalled Node is not guaranteed to satisfy
      # this repo's engines.node floor (package.json), unlike this
      # source repository's own ubuntu-slim copy, whose preinstalled
      # Node is already known to satisfy it (see idd-doctor.yml /
      # lint.yml, neither of which sets up Node explicitly). Pin an
      # explicit version so the mirrored template stays portable.
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/advisory-convergence.mjs --pr ${{ github.event.pull_request.number || inputs.pr_number }} --assert
