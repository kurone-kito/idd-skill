concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
name: Linting workflow
# CI topology (#832): pull_request is the only CI trigger so each check
# runs exactly once per change; the pre-PR push window is covered by the
# local pre-push contract instead of a duplicate push trigger.
#
# This workflow dogfoods the toolless bare-node adopter path: it runs
# with NO package-manager install, so every script and test it executes
# must import only `node:` builtins. The same three commands also run
# via `pnpm run lint:minimum` in pnpm-boundary.yml — that overlap is
# intentional redundancy proving both the installed and the bare-node
# runtimes. The formatting and spelling tools (dprint, cspell,
# markdownlint) run exactly once, in pnpm-boundary.yml.
on:
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-slim
    # Observed run duration is ~35-135s (gh api .../jobs started_at/
    # completed_at); 15 min bounds pathological hangs with ~7x headroom
    # over the slowest observed run.
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 is required by audit-docs' changed-file diff bases.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run documentation audit
        run: node scripts/audit-docs.mjs --check
      # The test suite is typed `.mts` executed via Node's native type
      # stripping (unflagged since 22.18), and this lane also invokes
      # migrated helper CLIs directly (e.g. verify-workshop-integrity.mjs
      # below), whose `if (import.meta.main)` entry guard is silently
      # falsy -- not an error -- on Node 24.0.x/24.1.x (#1447). A stale
      # runner image would therefore either mis-parse the .mts files or
      # let a CLI step silently no-op, so fail loudly first. Exact match
      # to package.json's engines.node (^22.22.2 || >=24.2.0), including
      # the patch/minor digits, so the error message's claimed range is
      # actually what the check enforces.
      - name: Assert Node.js floor
        run: |
          node -e '
            const [major, minor, patch] = process.versions.node.split(".").map(Number);
            const ok =
              (major === 22 && (minor > 22 || (minor === 22 && patch >= 2))) ||
              (major === 24 && minor >= 2) ||
              major > 24;
            if (!ok) {
              console.error(
                "Node " + process.version + " does not satisfy this " +
                "repository'"'"'s engines.node range (^22.22.2 || >=24.2.0).",
              );
              process.exit(1);
            }
          '
      - name: Run protocol tests
        run: node --test tests/*.test.mts
      - name: Run workshop integrity check
        run: node scripts/verify-workshop-integrity.mjs --format table
