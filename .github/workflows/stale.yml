name: Mark stale issues
on:
  schedule:
    - cron: '0 0 * * 1'
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          # IDD rationale: StaleBot is a visibility tool only. The stale
          # label is a human signal; closing is reserved for humans and
          # roadmap audits, because a StaleBot close is indistinguishable
          # from completed work to the A1.5 roadmap audit and auto-closed
          # PRs can fight legitimate IDD holds. Never auto-close.
          days-before-close: -1
          days-before-stale: 60
          exempt-issue-labels: bug,enhancement
          exempt-pr-labels: bug,enhancement
          stale-issue-label: stale
          stale-issue-message: StaleBot marked the issue as stale because there has been no activity.
          stale-pr-label: stale
          stale-pr-message: StaleBot marked the pull request as stale because there has been no activity.
