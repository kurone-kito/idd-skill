concurrency:
  cancel-in-progress: false
  group: pages
name: Publish schemas to GitHub Pages
on:
  push:
    branches:
      - main
    paths:
      - schemas/**
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    # Guard workflow_dispatch runs from non-main refs: the published
    # $id/$schema surface must never diverge from main.
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    # Observed deploy-job duration is ~10-410s (gh api .../jobs started_at/
    # completed_at; the 410s case is real GitHub Pages deployment latency,
    # not queue wait). 15 min (not the 10 min starting suggestion) keeps
    # ~2x headroom above that observed outlier while still bounding
    # pathological hangs.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Stage schemas-only artifact root
        # The Pages strategy (docs/pages-strategy.md) publishes only
        # schemas/ so canonical $id/$schema URLs resolve; the docs site
        # stays deferred.
        run: |
          mkdir -p _site
          cp -R schemas _site/schemas
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
