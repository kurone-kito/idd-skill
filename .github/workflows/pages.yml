concurrency:
  cancel-in-progress: false
  group: pages
name: Publish schemas to GitHub Pages
on:
  push:
    branches:
      - main
    paths:
      - schemas/**
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Stage schemas-only artifact root
        # The Pages strategy (docs/pages-strategy.md) publishes only
        # schemas/ so canonical $id/$schema URLs resolve; the docs site
        # stays deferred.
        run: |
          mkdir -p _site
          cp -R schemas _site/schemas
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
